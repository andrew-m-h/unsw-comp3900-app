# Local integration testing: LocalStack (AWS emulator) + Backend (Go API) + Frontend (static).
# Usage:
#   2. Start stack: make local-up
#   3. Backend API: http://localhost:8080  Frontend: http://localhost:3000  LocalStack: http://localhost:4566
#   4. Stop: make local-down

services:
  localstack:
    image: localstack/localstack
    container_name: "${LOCALSTACK_DOCKER_NAME:-localstack-main}"
    ports:
      - "127.0.0.1:4566:4566"            # LocalStack Gateway
      - "127.0.0.1:4510-4559:4510-4559"  # external services port range
    environment:
      - DEBUG=${DEBUG:-0}
      - AWS_DEFAULT_REGION=us-east-1
    volumes:
      - "${LOCALSTACK_VOLUME_DIR:-./.localstack/volume}:/var/lib/localstack"
      - "/var/run/docker.sock:/var/run/docker.sock"
    healthcheck:
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
      test: ["CMD", "curl", "-sf", "http://localhost:4566/_localstack/health"]

  # One-off job to create DynamoDB Guestbook table in LocalStack (matches infrastructure/ddb.go).
  dynamodb-init:
    image: public.ecr.aws/aws-cli/aws-cli:latest
    env_file: .env.example
    depends_on:
      localstack:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        aws dynamodb create-table \
          --endpoint-url http://localstack:4566 \
          --table-name Guestbook \
          --attribute-definitions \
            AttributeName=id,AttributeType=S \
            AttributeName=gsiPk,AttributeType=S \
            AttributeName=createdAt,AttributeType=S \
          --key-schema AttributeName=id,KeyType=HASH \
          --billing-mode PAY_PER_REQUEST \
          --global-secondary-indexes '[
            {
              "IndexName": "by-created",
              "KeySchema": [
                {"AttributeName": "gsiPk", "KeyType": "HASH"},
                {"AttributeName": "createdAt", "KeyType": "RANGE"}
              ],
              "Projection": {"ProjectionType": "ALL"}
            }
          ]' \
          || true
        echo "DynamoDB init done."
    restart: "no"

  backend:
    build:
      context: ./backend
      dockerfile: ../Dockerfile
    image: unsw-comp3900-app:local
    env_file: .env.example
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      dynamodb-init:
        condition: service_completed_successfully
    healthcheck:
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]

  frontend:
    image: nginx:alpine
    ports:
      - "127.0.0.1:3000:80"
    volumes:
      - "./frontend/dist:/usr/share/nginx/html/static:ro"
      - "./docker/nginx-default.conf:/etc/nginx/conf.d/default.conf:ro"
    depends_on:
      backend:
        condition: service_healthy
    # Serve built frontend at /static/ and proxy /api and /health to backend
