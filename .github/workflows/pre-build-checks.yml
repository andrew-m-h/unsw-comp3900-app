# Pre-build checks: e2e tests, lint, etc. Run before merge and before deployment.
# Add more jobs (e.g. lint, unit tests) as needed.

name: Pre-build checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  e2e-integration-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: backend/go.sum

      - name: Run unit tests
        run: make unittest

      - name: Build frontend
        run: make frontend-build

      - name: Start stack
        run: make local-up

      - name: Wait for stack
        run: |
          for i in $(seq 1 30); do
            if curl -sf -H "Accept: application/json" http://localhost:3000/api/health >/dev/null; then
              echo "Stack is ready"
              exit 0
            fi
            echo "Waiting for stack... ($i/30)"
            sleep 5
          done
          echo "Stack did not become ready"
          exit 1

      - name: Run integration tests
        run: make integration

      - name: Run E2E tests
        run: make e2e

      - name: Teardown stack
        if: always()
        run: make local-down
