# Build Vue frontend and upload to S3 (static assets bucket from BaseStack).
# Uses OIDC; expects AWS_CDK_DEPLOY_ROLE_ARN. Call after BaseStack is deployed.

name: Upload frontend to S3

on:
  workflow_dispatch:
  workflow_call:

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'ap-southeast-2' }}

jobs:
  upload-frontend:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_CDK_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get S3 bucket name
        id: bucket
        run: |
          BUCKET=$(aws cloudformation describe-stacks \
            --stack-name UNSWComp3900BaseStack \
            --query "Stacks[0].Outputs[?OutputKey=='StaticAssetsBucketName'].OutputValue" \
            --output text)
          if [ -z "$BUCKET" ] || [ "$BUCKET" == "None" ]; then
            echo "error: Could not get StaticAssetsBucketName from BaseStack"
            exit 1
          fi
          echo "bucket=$BUCKET" >> "$GITHUB_OUTPUT"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install and build frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Upload frontend to S3
        run: |
          aws s3 sync frontend/dist/ s3://${{ steps.bucket.outputs.bucket }}/static/ \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html"
          aws s3 cp frontend/dist/index.html s3://${{ steps.bucket.outputs.bucket }}/static/index.html \
            --cache-control "public, max-age=0, must-revalidate"
