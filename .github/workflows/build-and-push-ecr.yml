# Build the Docker image and push to AWS ECR.
# Uses OIDC to assume the IAM role (no access keys). Requires repo secrets/variables below.

name: Build and push to ECR

on:
  workflow_dispatch:
  workflow_call:

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'ap-southeast-2' }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get latest version tag
        id: version
        run: |
          VERSION=$(git tag -l 'v*.*.*' --sort=-v:refname | head -1)
          if [ -z "$VERSION" ]; then
            VERSION="${{ github.sha }}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set ECR registry
        id: ecr
        run: |
          URI="${{ vars.ECR_REPOSITORY_URI }}"
          if [ -z "$URI" ]; then
            echo "error: Set repository variable ECR_REPOSITORY_URI (from BaseStack output ECRRepositoryUri)"
            exit 1
          fi
          echo "registry=${URI%/*}" >> "$GITHUB_OUTPUT"
          echo "repository=$URI" >> "$GITHUB_OUTPUT"

      - name: Log in to Amazon ECR
        run: |
          aws ecr get-login-password --region ${{ env.AWS_REGION }} | \
            docker login --username AWS --password-stdin ${{ steps.ecr.outputs.registry }}

      - name: Build and push
        run: |
          IMAGE="${{ steps.ecr.outputs.repository }}"
          VERSION="${{ steps.version.outputs.version }}"
          docker build -f Dockerfile --build-arg VERSION="$VERSION" -t "$IMAGE:$VERSION" -t "$IMAGE:latest" backend
          docker push "$IMAGE:$VERSION"
          docker push "$IMAGE:latest"
          docker tag "$IMAGE:latest" "$IMAGE:${{ github.sha }}"
          docker push "$IMAGE:${{ github.sha }}"
