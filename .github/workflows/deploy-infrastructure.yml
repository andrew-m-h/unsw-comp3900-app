# Deploy CDK stacks and app image: BaseStack → build & push (separate workflow) → AppStack.
# Uses OIDC: CDK deploy role for stacks; ECR push role is used inside build-and-push-ecr.

name: Deploy infrastructure

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'ap-southeast-2' }}

jobs:
  deploy-base:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: infrastructure/go.sum

      - name: Configure AWS credentials (CDK deploy)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_CDK_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install CDK CLI
        run: npm install -g aws-cdk

      - name: Deploy BaseStack
        working-directory: infrastructure
        run: cdk deploy --asset-metadata false --path-metadata false --telemetry false --require-approval never BaseStack

  build-push:
    needs: deploy-base
    permissions:
      id-token: write
      contents: read
    uses: ./.github/workflows/build-and-push-ecr.yml
    secrets: inherit

  deploy-app:
    needs: build-push
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: infrastructure/go.sum

      - name: Configure AWS credentials (CDK deploy)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_CDK_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install CDK CLI
        run: npm install -g aws-cdk

      - name: Deploy AppStack
        working-directory: infrastructure
        run: cdk deploy --asset-metadata false --path-metadata false --telemetry false --require-approval never AppStack
